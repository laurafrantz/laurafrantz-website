baseURL = "https://laurafrantz.com/"
locale = "en-us"
title = "Laura J. Frantz"
theme = "PaperMod"

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
enableEmoji = true
pygmentsUseClasses = true

# Timezone (confirmed decision)
timeZone = "America/New_York"

# Home page outputs: JSON is required for client-side (Fuse.js) search
[outputs]
  home = ["HTML", "RSS", "JSON"]

[pagination]
  pagerSize = 10

[params]
  env = "production"
  title = "Laura J. Frantz"
  description = "Journal of a reflective life."
  author = "Laura J. Frantz"
  defaultTheme = "auto"        # light | dark | auto
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowRssButtonInSectionTermList = true
  ShowToc = false
  hidemeta = false
  disableScrollToTop = false

  # Landing page intro block (image only; site title/tagline shown in the header)
  [params.homeInfoParams]
    Title = ""
    Content = "![White asters in a late-summer meadow](/images/landing.jpg)"

  # Fuse.js search options
  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.4
    minMatchCharLength = 0
    keys = ["title", "permalink", "summary", "content"]

[menu]
  [[menu.main]]
    identifier = "search"
    name = "Search"
    url = "/search/"
    weight = 5
  [[menu.main]]
    identifier = "archive"
    name = "Archive"
    url = "/archives/"
    weight = 10
  [[menu.main]]
    identifier = "tags"
    name = "Tags"
    url = "/tags/"
    weight = 20
  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 30

[services]
  [services.rss]
    limit = -1
