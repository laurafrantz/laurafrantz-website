name: Deploy Hugo site to Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  # Bursts of quick edits only build the latest push; superseded runs cancel.
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.164.0
      HUGO_ENVIRONMENT: production
      TZ: America/New_York
    steps:
      - name: Install Hugo CLI
        run: |
          wget -O ${{ runner.temp }}/hugo.deb \
            https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb \
          && sudo dpkg -i ${{ runner.temp }}/hugo.deb
      - name: Install Dart Sass
        run: sudo snap install dart-sass
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
      - name: Cache Hugo processed images
        uses: actions/cache@v4
        with:
          path: |
            resources/_gen
            ${{ runner.temp }}/hugo_cache
          key: hugo-${{ runner.os }}-${{ hashFiles('assets/**', 'content/**', 'hugo.toml') }}
          restore-keys: |
            hugo-${{ runner.os }}-
      - name: Build with Hugo
        env:
          HUGO_CACHEDIR: ${{ runner.temp }}/hugo_cache
          HUGO_ENVIRONMENT: production
        run: |
          hugo \
            --gc \
            --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/"
      - name: Stamp copyright metadata on images
        run: |
          sudo apt-get update && sudo apt-get install -y libimage-exiftool-perl
          exiftool -overwrite_original -r -q -m \
            -XMP-dc:Rights="© Laura J. Frantz. All rights reserved." \
            -XMP-dc:Creator="Laura J. Frantz" \
            -IPTC:CopyrightNotice="© Laura J. Frantz. All rights reserved." \
            -IPTC:By-line="Laura J. Frantz" \
            -EXIF:Copyright="© Laura J. Frantz" \
            -ext jpg -ext jpeg -ext png -ext webp \
            ./public || true
      - name: Diagnose senecio cover images (temporary)
        run: |
          echo "=== file(1) ==="
          file public/posts/senecio-rowleyanus/senecio*.jpg || true
          echo "=== exiftool full raw dump ==="
          exiftool -a -G1 -s -struct public/posts/senecio-rowleyanus/senecio.jpg || true
          echo "=== exiftool validate ==="
          exiftool -validate -warning -error -a public/posts/senecio-rowleyanus/senecio*.jpg || true
          echo "=== python Pillow full decode test ==="
          python3 -m pip install --quiet Pillow
          python3 -c "
          from PIL import Image
          import glob
          for f in sorted(glob.glob('public/posts/senecio-rowleyanus/senecio*.jpg')):
              try:
                  im = Image.open(f)
                  im.load()
                  exif = im.getexif()
                  print(f, 'DECODE_OK size=', im.size, 'mode=', im.mode, 'orientation=', exif.get(274), 'icc=', im.info.get('icc_profile') is not None)
              except Exception as e:
                  print(f, 'DECODE_FAILED:', repr(e))
          "
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
