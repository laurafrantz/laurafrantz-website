<script>
(function () {
    var nav = document.querySelector('.header-nav');
    var logo = nav && nav.querySelector('.logo');
    var menu = nav && nav.querySelector('#menu');
    if (!nav || !logo || !menu) return;

    var btn = document.createElement('button');
    btn.className = 'nav-hamburger';
    btn.type = 'button';
    btn.setAttribute('aria-label', 'Toggle menu');
    btn.setAttribute('aria-controls', 'menu');
    btn.setAttribute('aria-expanded', 'false');
    btn.innerHTML = '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>';

    btn.addEventListener('click', function () {
        var open = nav.classList.toggle('menu-open');
        btn.setAttribute('aria-expanded', open ? 'true' : 'false');
    });
    logo.appendChild(btn);

    // Close the menu after a nav link is tapped.
    menu.addEventListener('click', function (e) {
        if (e.target.closest('a')) nav.classList.remove('menu-open');
    });
})();
</script>
